# CLIP Base Model Configuration

# Data configuration
data:
  image_size: 224
  num_workers: 4

# Text configuration  
text:
  max_length: 77  # Standard CLIP text length

# Model configuration
model:
  embed_dim: 512
  
  vision:
    patch_size: 16
    d_model: 768
    n_heads: 12
    n_layers: 12
    dropout: 0.1
  
  text:
    d_model: 512
    n_heads: 8
    n_layers: 12
    d_ff: 2048
    dropout: 0.1

# Training configuration
training:
  batch_size: 256
  num_epochs: 32
  learning_rate: 5.0e-4
  weight_decay: 0.2
  warmup_steps: 10000
  max_steps: 1000000
  gradient_clip_val: 1.0
  
  # Distributed training
  strategy: "ddp"  # or "fsdp" for large models
  precision: "bf16-mixed"  # bf16 mixed precision
  
  # Validation
  val_check_interval: 1.0  # Check validation every epoch
