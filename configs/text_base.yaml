# Configuration for base Text-to-Text model

data:
  raw_data_path: data/raw
  processed_data_path: data/processed
  cache_dir: data/cache
  max_workers: 8
  batch_size: 32

text:
  vocab_size: 32000
  max_seq_length: 512
  sentencepiece_model_type: unigram
  normalization: nmt_nfkc

model:
  # Model architecture
  d_model: 768
  n_heads: 12
  n_layers: 12
  d_ff: 3072
  dropout: 0.1
  
  # Vision (for future use)
  image_size: 512
  latent_dim: 4
  vae_scale_factor: 8
  
  # Video (for future use)
  video_frames: 16
  frame_rate: 24
  
  # Audio (for future use)
  audio_sample_rate: 32000
  audio_channels: 1

training:
  # Optimization
  learning_rate: 0.0001
  weight_decay: 0.01
  warmup_steps: 10000
  max_steps: 1000000
  gradient_clip: 1.0
  
  # Distributed training
  strategy: ddp  # ddp, fsdp, deepspeed
  precision: bf16-mixed  # 32, 16-mixed, bf16-mixed
  num_nodes: 1
  devices: -1  # -1 = all available GPUs
  
  # Checkpointing
  checkpoint_dir: checkpoints
  save_every_n_steps: 5000
  keep_last_n_checkpoints: 3
  
  # Logging
  log_every_n_steps: 100
  val_check_interval: 1000
  use_wandb: true
  wandb_project: sarvanjna

seed: 42
debug: false
